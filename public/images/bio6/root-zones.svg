<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" font-family="system-ui,sans-serif">
  <rect width="360" height="320" fill="#0d1117"/>

  <!-- Root body -->
  <rect x="150" y="20" width="60" height="260" rx="8" fill="#1a2a1a" stroke="#30363d" stroke-width="1"/>

  <!-- Zone bands -->
  <!-- Cap zone -->
  <rect x="150" y="250" width="60" height="30" rx="0" fill="#1e3320"/>
  <!-- Division zone -->
  <rect x="150" y="200" width="60" height="50" rx="0" fill="#1a3a1a"/>
  <!-- Elongation zone -->
  <rect x="150" y="140" width="60" height="60" rx="0" fill="#163016"/>
  <!-- Absorption zone -->
  <rect x="150" y="60" width="60" height="80" rx="0" fill="#112611"/>
  <!-- Conduction zone -->
  <rect x="150" y="20" width="60" height="40" rx="8" fill="#0e200e"/>

  <!-- Root cap (cone) -->
  <polygon points="150,280 210,280 180,310" fill="#2a4a2a" stroke="#8cc882" stroke-width="1.5"/>

  <!-- Root hairs (absorption zone) -->
  <g stroke="#a8c5d8" stroke-width="1" opacity="0.8">
    <line x1="150" y1="75"  x2="110" y2="72"/>
    <line x1="150" y1="90"  x2="105" y2="88"/>
    <line x1="150" y1="105" x2="108" y2="103"/>
    <line x1="150" y1="120" x2="112" y2="118"/>
    <line x1="210" y1="75"  x2="250" y2="72"/>
    <line x1="210" y1="90"  x2="255" y2="88"/>
    <line x1="210" y1="105" x2="252" y2="103"/>
    <line x1="210" y1="120" x2="248" y2="118"/>
  </g>

  <!-- Zone labels (right) — use textLength to constrain wide text -->
  <line x1="210" y1="30"  x2="228" y2="30"  stroke="#8b949e" stroke-width="1"/>
  <text x="231" y="34" font-size="11" fill="#e8c891">зона проведения</text>

  <line x1="210" y1="100" x2="228" y2="100" stroke="#8b949e" stroke-width="1"/>
  <text x="231" y="97"  font-size="11" fill="#a8c5d8">зона всасывания</text>
  <text x="231" y="111" font-size="11" fill="#8b949e">(корневые волоски)</text>

  <line x1="210" y1="170" x2="228" y2="170" stroke="#8b949e" stroke-width="1"/>
  <text x="231" y="167" font-size="11" fill="#8cc882">зона растяжения</text>

  <line x1="210" y1="225" x2="228" y2="225" stroke="#8b949e" stroke-width="1"/>
  <text x="231" y="222" font-size="11" fill="#e8c891">зона деления</text>
  <text x="231" y="236" font-size="11" fill="#8b949e">(меристема)</text>

  <line x1="210" y1="290" x2="228" y2="290" stroke="#8b949e" stroke-width="1"/>
  <text x="231" y="294" font-size="11" fill="#8cc882">корневой чехлик</text>

  <!-- Up arrow -->
  <line x1="135" y1="280" x2="135" y2="30" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="130,30 135,18 140,30" fill="#8b949e"/>
  <text x="118" y="155" font-size="11" fill="#8b949e" transform="rotate(-90,118,155)">рост корня ↑</text>

  <text x="180" y="15" text-anchor="middle" font-size="12" fill="#8b949e">Зоны корня</text>
</svg>
