<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" font-family="system-ui,sans-serif">
  <rect width="360" height="300" fill="#0d1117"/>
  <!-- Outer ring: epidermis -->
  <circle cx="160" cy="148" r="110" fill="#0a1a0a" stroke="#8cc882" stroke-width="2"/>
  <!-- Cortex -->
  <circle cx="160" cy="148" r="90" fill="#0d150d" stroke="#8b949e" stroke-width="1.5"/>
  <!-- Endodermis -->
  <circle cx="160" cy="148" r="66" fill="#0f1a0f" stroke="#a8c5d8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Pericycle -->
  <circle cx="160" cy="148" r="54" fill="#111a0f" stroke="#8b949e" stroke-width="1"/>
  <!-- Xylem star (4-pointed) -->
  <polygon points="160,98 172,136 160,148 148,136" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <polygon points="210,148 172,160 160,148 172,136" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <polygon points="160,198 148,160 160,148 172,160" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <polygon points="110,148 148,136 160,148 148,160" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <!-- Phloem groups between xylem arms -->
  <ellipse cx="185" cy="118" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="185" cy="178" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="135" cy="118" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="135" cy="178" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <!-- Root hairs on epidermis -->
  <line x1="160" y1="38" x2="160" y2="24" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="215" y1="57" x2="225" y2="45" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="258" y1="103" x2="272" y2="97" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="105" y1="57" x2="95" y2="45" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="62" y1="103" x2="48" y2="97" stroke="#8cc882" stroke-width="1.5"/>
  <text x="165" y="20" font-size="8" fill="#8cc882">корневой волосок</text>
  <!-- Right-side labels -->
  <line x1="270" y1="97" x2="300" y2="90" stroke="#8b949e" stroke-width="0.8"/>
  <text x="302" y="93" font-size="9" fill="#8cc882">эпидермис</text>
  <line x1="245" y1="115" x2="300" y2="115" stroke="#8b949e" stroke-width="0.8"/>
  <text x="302" y="119" font-size="9" fill="#8b949e">кора</text>
  <line x1="224" y1="130" x2="300" y2="140" stroke="#8b949e" stroke-width="0.8"/>
  <text x="302" y="144" font-size="9" fill="#a8c5d8">эндодерма</text>
  <line x1="213" y1="148" x2="300" y2="165" stroke="#8b949e" stroke-width="0.8"/>
  <text x="302" y="169" font-size="9" fill="#e8a070">ксилема</text>
  <line x1="193" y1="120" x2="250" y2="188" stroke="#8b949e" stroke-width="0.8"/>
  <text x="253" y="192" font-size="9" fill="#a8c5d8">флоэма</text>
  <text x="180" y="285" text-anchor="middle" font-size="11" fill="#8b949e">Поперечный срез корня</text>
</svg>
