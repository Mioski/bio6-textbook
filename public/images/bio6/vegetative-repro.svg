<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" font-family="system-ui,sans-serif">
  <rect width="360" height="300" fill="#0d1117"/>
  <text x="180" y="18" text-anchor="middle" font-size="12" fill="#e8c891" font-weight="600">Вегетативное размножение</text>

  <!-- 1. Усы (клубника) -->
  <rect x="5" y="28" width="107" height="122" rx="6" fill="#0a1a0a" stroke="#8cc882" stroke-width="1.5"/>
  <text x="58" y="44" text-anchor="middle" font-size="11" fill="#8cc882">Ус (клубника)</text>
  <!-- Mother plant -->
  <circle cx="30" cy="90" r="12" fill="#1a3a1a" stroke="#8cc882" stroke-width="1.5"/>
  <text x="30" y="93" text-anchor="middle" font-size="11" fill="#8cc882">мат.</text>
  <!-- Stolon -->
  <path d="M42,88 Q65,75 78,88" stroke="#8cc882" stroke-width="2" fill="none"/>
  <!-- New plant -->
  <circle cx="90" cy="95" r="10" fill="#1a3a1a" stroke="#8cc882" stroke-width="1.5"/>
  <text x="90" y="98" text-anchor="middle" font-size="11" fill="#8cc882">доч.</text>
  <!-- Roots from new plant -->
  <line x1="90" y1="105" x2="84" y2="118" stroke="#e8a070" stroke-width="1.5"/>
  <line x1="90" y1="105" x2="96" y2="118" stroke="#e8a070" stroke-width="1.5"/>
  <!-- soil -->
  <line x1="15" y1="118" x2="102" y2="118" stroke="#3d2a10" stroke-width="1.5"/>
  <text x="58" y="134" text-anchor="middle" font-size="11" fill="#8b949e">горизонтальный побег</text>
  <text x="58" y="146" text-anchor="middle" font-size="11" fill="#8b949e">с укоренением</text>

  <!-- 2. Клубень (картофель) -->
  <rect x="126" y="28" width="107" height="122" rx="6" fill="#1a1208" stroke="#e8c891" stroke-width="1.5"/>
  <text x="179" y="44" text-anchor="middle" font-size="11" fill="#e8c891">Клубень (картофель)</text>
  <!-- Potato tuber -->
  <ellipse cx="179" cy="85" rx="32" ry="22" fill="#2a1808" stroke="#e8c891" stroke-width="2"/>
  <!-- Eyes on tuber -->
  <circle cx="158" cy="80" r="4" fill="#1a1208" stroke="#e8c891" stroke-width="1"/>
  <circle cx="179" cy="75" r="4" fill="#1a1208" stroke="#e8c891" stroke-width="1"/>
  <circle cx="200" cy="82" r="4" fill="#1a1208" stroke="#e8c891" stroke-width="1"/>
  <circle cx="168" cy="92" r="4" fill="#1a1208" stroke="#e8c891" stroke-width="1"/>
  <!-- Sprouts -->
  <path d="M158,76 L155,62" stroke="#8cc882" stroke-width="1.5"/>
  <path d="M179,71 L179,58" stroke="#8cc882" stroke-width="1.5"/>
  <text x="179" y="120" text-anchor="middle" font-size="11" fill="#8b949e">почки («глазки»)</text>
  <text x="179" y="133" text-anchor="middle" font-size="11" fill="#8b949e">→ новое растение</text>
  <text x="179" y="146" text-anchor="middle" font-size="11" fill="#8b949e">видоизм. побег</text>

  <!-- 3. Луковица (лук) -->
  <rect x="247" y="28" width="107" height="122" rx="6" fill="#1a0a1a" stroke="#a8c5d8" stroke-width="1.5"/>
  <text x="300" y="44" text-anchor="middle" font-size="11" fill="#a8c5d8">Луковица (лук)</text>
  <!-- Bulb shape -->
  <ellipse cx="300" cy="88" rx="30" ry="26" fill="#1a1a2a" stroke="#a8c5d8" stroke-width="2"/>
  <!-- Scales (чешуи) -->
  <ellipse cx="300" cy="90" rx="22" ry="18" fill="#0f0f2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="300" cy="92" rx="14" ry="12" fill="#0a0a1a" stroke="#a8c5d8" stroke-width="1"/>
  <!-- Stem at bottom -->
  <ellipse cx="300" cy="112" rx="12" ry="5" fill="#1a1a08" stroke="#e8c891" stroke-width="1"/>
  <!-- Roots -->
  <line x1="293" y1="117" x2="287" y2="128" stroke="#e8a070" stroke-width="1.5"/>
  <line x1="300" y1="117" x2="300" y2="130" stroke="#e8a070" stroke-width="1.5"/>
  <line x1="307" y1="117" x2="313" y2="128" stroke="#e8a070" stroke-width="1.5"/>
  <text x="300" y="138" text-anchor="middle" font-size="11" fill="#8b949e">листья-чешуи</text>
  <text x="300" y="150" text-anchor="middle" font-size="11" fill="#8b949e">+ укор. стебель</text>

  <!-- Bottom row: rhizome + cutting -->
  <!-- 4. Корневище (ландыш) -->
  <rect x="5" y="162" width="160" height="112" rx="6" fill="#0a1a0a" stroke="#8cc882" stroke-width="1.5"/>
  <text x="85" y="178" text-anchor="middle" font-size="11" fill="#8cc882">Корневище (ландыш, пырей)</text>
  <!-- Horizontal rhizome -->
  <rect x="20" y="222" width="130" height="12" rx="5" fill="#1a2a0a" stroke="#8cc882" stroke-width="1.5"/>
  <!-- Nodes on rhizome -->
  <circle cx="48" cy="228" r="5" fill="#2a3a1a" stroke="#8cc882" stroke-width="1.5"/>
  <circle cx="85" cy="228" r="5" fill="#2a3a1a" stroke="#8cc882" stroke-width="1.5"/>
  <circle cx="122" cy="228" r="5" fill="#2a3a1a" stroke="#8cc882" stroke-width="1.5"/>
  <!-- Shoots up -->
  <line x1="48" y1="222" x2="48" y2="197" stroke="#8cc882" stroke-width="2"/>
  <line x1="85" y1="222" x2="85" y2="192" stroke="#8cc882" stroke-width="2"/>
  <line x1="122" y1="222" x2="122" y2="197" stroke="#8cc882" stroke-width="2"/>
  <!-- Leaves -->
  <ellipse cx="42" cy="192" rx="12" ry="6" fill="#1a3a1a" stroke="#8cc882" stroke-width="1" transform="rotate(-30,42,192)"/>
  <ellipse cx="85" cy="187" rx="12" ry="6" fill="#1a3a1a" stroke="#8cc882" stroke-width="1"/>
  <ellipse cx="128" cy="192" rx="12" ry="6" fill="#1a3a1a" stroke="#8cc882" stroke-width="1" transform="rotate(30,128,192)"/>
  <!-- Roots -->
  <line x1="48" y1="234" x2="48" y2="250" stroke="#e8a070" stroke-width="1.5"/>
  <line x1="85" y1="234" x2="85" y2="252" stroke="#e8a070" stroke-width="1.5"/>
  <line x1="122" y1="234" x2="122" y2="250" stroke="#e8a070" stroke-width="1.5"/>
  <text x="85" y="267" text-anchor="middle" font-size="11" fill="#8b949e">подземный побег с узлами</text>

  <!-- 5. Черенкование -->
  <rect x="177" y="162" width="177" height="112" rx="6" fill="#1a1208" stroke="#e8c891" stroke-width="1.5"/>
  <text x="265" y="178" text-anchor="middle" font-size="11" fill="#e8c891">Черенкование</text>
  <!-- Cut stem -->
  <rect x="255" y="190" width="14" height="55" rx="4" fill="#1a2a0a" stroke="#8cc882" stroke-width="1.5"/>
  <!-- Leaves on stem -->
  <ellipse cx="240" cy="202" rx="16" ry="8" fill="#1a3a1a" stroke="#8cc882" stroke-width="1" transform="rotate(-20,240,202)"/>
  <ellipse cx="283" cy="202" rx="16" ry="8" fill="#1a3a1a" stroke="#8cc882" stroke-width="1" transform="rotate(20,283,202)"/>
  <!-- Roots growing -->
  <path d="M262,245 L250,264" stroke="#e8a070" stroke-width="2" stroke-linecap="round"/>
  <path d="M262,245 L262,267" stroke="#e8a070" stroke-width="2" stroke-linecap="round"/>
  <path d="M262,245 L274,264" stroke="#e8a070" stroke-width="2" stroke-linecap="round"/>
  <!-- water -->
  <line x1="230" y1="247" x2="340" y2="247" stroke="#a8c5d8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="343" y="251" font-size="11" fill="#a8c5d8">H₂O</text>
  <text x="265" y="267" text-anchor="middle" font-size="11" fill="#8b949e">отрезок побега → корни</text>
  <text x="180" y="285" text-anchor="middle" font-size="11" fill="#8b949e" textLength="340" lengthAdjust="spacing">Способы вегетативного размножения</text>
</svg>
