<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" font-family="system-ui,sans-serif">
  <rect width="360" height="300" fill="#0d1117"/>
  <!-- Outer ring: epidermis -->
  <circle cx="155" cy="148" r="108" fill="#0a1a0a" stroke="#8cc882" stroke-width="2"/>
  <!-- Cortex -->
  <circle cx="155" cy="148" r="88" fill="#0d150d" stroke="#8b949e" stroke-width="1.5"/>
  <!-- Endodermis -->
  <circle cx="155" cy="148" r="64" fill="#0f1a0f" stroke="#a8c5d8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Pericycle -->
  <circle cx="155" cy="148" r="52" fill="#111a0f" stroke="#8b949e" stroke-width="1"/>
  <!-- Xylem star (4-pointed) -->
  <polygon points="155,98 167,136 155,148 143,136" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <polygon points="205,148 167,160 155,148 167,136" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <polygon points="155,198 143,160 155,148 167,160" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <polygon points="105,148 143,136 155,148 143,160" fill="#2a1808" stroke="#e8a070" stroke-width="1.5"/>
  <!-- Phloem groups between xylem arms -->
  <ellipse cx="180" cy="118" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="180" cy="178" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="130" cy="118" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <ellipse cx="130" cy="178" rx="8" ry="6" fill="#0a1a2a" stroke="#a8c5d8" stroke-width="1.5"/>
  <!-- Root hairs on epidermis -->
  <line x1="155" y1="40" x2="155" y2="26" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="210" y1="57" x2="220" y2="45" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="253" y1="103" x2="267" y2="97" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="100" y1="57" x2="90" y2="45" stroke="#8cc882" stroke-width="1.5"/>
  <line x1="57" y1="103" x2="43" y2="97" stroke="#8cc882" stroke-width="1.5"/>
  <!-- Hair label (top) -->
  <text x="155" y="20" text-anchor="middle" font-size="11" fill="#8cc882">корневой волосок</text>

  <!-- Right-side labels — keep within 360px -->
  <line x1="265" y1="97" x2="288" y2="90" stroke="#8b949e" stroke-width="0.8"/>
  <text x="291" y="94" font-size="11" fill="#8cc882">эпидермис</text>

  <line x1="240" y1="115" x2="288" y2="115" stroke="#8b949e" stroke-width="0.8"/>
  <text x="291" y="119" font-size="11" fill="#8b949e">кора</text>

  <line x1="219" y1="130" x2="288" y2="140" stroke="#8b949e" stroke-width="0.8"/>
  <text x="291" y="144" font-size="11" fill="#a8c5d8">эндодерма</text>

  <line x1="207" y1="148" x2="288" y2="163" stroke="#8b949e" stroke-width="0.8"/>
  <text x="291" y="167" font-size="11" fill="#e8a070">ксилема</text>

  <line x1="188" y1="120" x2="245" y2="186" stroke="#8b949e" stroke-width="0.8"/>
  <text x="248" y="190" font-size="11" fill="#a8c5d8">флоэма</text>

  <text x="175" y="285" text-anchor="middle" font-size="11" fill="#8b949e">Поперечный срез корня</text>
</svg>
